<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMUKO-OS | Trident Protocol + Gesture Auth</title>
    <style>
        :root {
            --bg-color: #2C2A28;
            --primary: #D48C45;
            --secondary: #A68B5B;
            --accent: #B8860B;
            --text-light: #EAE6E1;
            --success: #00ff41;
            --fail: #ff3333;
            --warn: #ffd166;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

        body, html {
            width: 100%; height: 100%; overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Courier New', Courier, monospace;
            color: var(--text-light);
        }

        #mmukoCanvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; }

        #ui-layer {
            position: absolute; inset: 0;
            z-index: 2; pointer-events: none; padding: 20px;
            display: flex; flex-direction: column; justify-content: space-between;
        }

        header {
            pointer-events: auto; border-left: 4px solid var(--primary);
            padding: 12px 0 12px 15px; background: rgba(44, 42, 40, 0.9);
            backdrop-filter: blur(8px); width: fit-content;
        }

        .brand { font-size: 24px; font-weight: bold; letter-spacing: 2px; color: var(--primary); }
        .version { font-size: 12px; color: var(--secondary); margin-left: 10px; opacity: 0.75; }
        .subtitle { font-size: 11px; margin-top: 5px; letter-spacing: 1px; color: var(--secondary); }

        #boot-status-panel {
            position: absolute; top: 20px; right: 20px; width: 350px;
            background: rgba(30, 28, 26, 0.95); border: 1px solid var(--secondary);
            padding: 16px; pointer-events: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .panel-header { border-bottom: 1px solid var(--accent); margin-bottom: 12px; padding-bottom: 8px; color: var(--accent); font-weight: bold; text-align: right; font-size: 14px; letter-spacing: 1px; }
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; }
        .label { color: var(--secondary); }
        .value { font-weight: bold; transition: color 0.25s ease; }
        .verified { color: var(--success); text-shadow: 0 0 10px var(--success); }
        .locked { color: var(--fail); text-shadow: 0 0 10px var(--fail); }
        .warn { color: var(--warn); }

        #controls {
            margin-top: 10px;
            border-top: 1px solid #5a5040;
            padding-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .control-row {
            display: flex;
            gap: 8px;
            pointer-events: auto;
        }

        button, input {
            pointer-events: auto;
            font-family: inherit;
            font-size: 12px;
            border: 1px solid var(--secondary);
            background: rgba(0,0,0,0.35);
            color: var(--text-light);
            padding: 6px 8px;
            outline: none;
        }

        button { cursor: pointer; }
        button:hover { border-color: var(--primary); }
        input { width: 100%; }

        #terminal-output {
            pointer-events: auto; width: 520px; height: 240px;
            background: rgba(0, 0, 0, 0.85); border: 1px solid var(--secondary);
            position: absolute; bottom: 20px; left: 20px; padding: 12px;
            overflow: hidden; font-size: 11px; color: var(--secondary);
            box-shadow: 0 -5px 20px rgba(0,0,0,0.4);
        }

        #logs { display: flex; flex-direction: column; height: 100%; overflow-y: auto; scrollbar-width: none; }
        .log-entry { margin-bottom: 4px; border-left: 2px solid #444; padding-left: 8px; line-height: 1.35; }
        .log-entry.phase { color: var(--primary); font-weight: bold; margin-top: 8px; border-left-color: var(--primary); }
        .log-entry.success { color: var(--success); border-left-color: var(--success); }
        .log-entry.error { color: var(--fail); border-left-color: var(--fail); }
        .log-entry.warn { color: var(--warn); border-left-color: var(--warn); }

        .scanline {
            width: 100%; height: 3px; background: rgba(212, 140, 69, 0.04);
            position: absolute; top: 0; left: 0; animation: scan 6s linear infinite; pointer-events: none; z-index: 10;
        }

        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }

        .vignette {
            position: absolute; inset: 0;
            background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.4) 100%);
            pointer-events: none; z-index: 5;
        }

        video { display: none; }
    </style>
</head>
<body>
    <video id="gestureVideo" autoplay playsinline muted></video>
    <canvas id="mmukoCanvas"></canvas>
    <div class="scanline"></div>
    <div class="vignette"></div>

    <div id="ui-layer">
        <header>
            <div class="brand">MMUKO-OS <span class="version">v1.1.0-GAUTH</span></div>
            <div class="subtitle">PROTOCOL: ENROLL • VERIFY • FALLBACK</div>
        </header>

        <div id="boot-status-panel">
            <div class="panel-header">AURA-SEAL COHERENCE</div>
            <div class="stat-row"><span class="label">MODE:</span><span id="mode-val" class="value">ENROLL</span></div>
            <div class="stat-row"><span class="label">BOOT STATE:</span><span id="state-val" class="value">SPARSE</span></div>
            <div class="stat-row"><span class="label">COHERENCE:</span><span id="coherence-val" class="value">0.0%</span></div>
            <div class="stat-row"><span class="label">MATCH SCORE:</span><span id="match-val" class="value">N/A</span></div>
            <div class="stat-row"><span class="label">ATTEMPTS:</span><span id="attempts-val" class="value">0/5</span></div>
            <div class="stat-row"><span class="label">TRACKING:</span><span id="tracking-val" class="value">INITIALIZING</span></div>
            <div class="stat-row" style="margin-top: 10px; border-top: 1px solid #444; padding-top: 10px"><span class="label">P1 (IDENTITY):</span><span id="p1-status" class="value">PENDING</span></div>
            <div class="stat-row"><span class="label">P2 (DEVICE):</span><span id="p2-status" class="value">PENDING</span></div>
            <div class="stat-row"><span class="label">P3 (TIME):</span><span id="p3-status" class="value">PENDING</span></div>

            <div id="controls">
                <div class="control-row">
                    <button id="enroll-btn">Capture Enrollment</button>
                    <button id="verify-btn">Run Verify</button>
                    <button id="fallback-btn">Use Fallback</button>
                </div>
                <div class="control-row">
                    <input id="credential-input" type="password" placeholder="Fallback passphrase" autocomplete="off">
                </div>
                <div class="control-row">
                    <button id="set-credential-btn">Set/Update Credential</button>
                    <button id="unlock-btn">Unlock via Credential</button>
                </div>
            </div>
        </div>

        <div id="terminal-output"><div id="logs"></div></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="script.js"></script>
</body>
</html>
